spring.application.name=customer-service

# ===============================
# Eureka Configuration
# ===============================

# Docker Eureka server
#eureka.client.service-url.defaultZone=http://eureka:8761/eureka/
#eureka.client.service-url.defaultZone=http://eureka:8761/eureka/
eureka.client.service-url.defaultZone=http://host.docker.internal:8761/eureka/

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Eureka Instance settings (important for Docker)
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=customer-service
eureka.instance.instance-id=${spring.application.name}:${server.port}


# ===============================
# Actuator
# ===============================

management.server.port=8082
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.kafka.enabled=true
management.endpoint.prometheus.enabled=true


# ==============================
# Redis Configuration
# ==============================

spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=Password123
spring.data.redis.timeout=60000

# Cache
spring.cache.type=redis


# ==============================
# Kafka Configuration
# ==============================

spring.kafka.bootstrap-servers=kafka:9092

# Consumer
spring.kafka.consumer.group-id=customer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


# ==============================
# Gmail SMTP Configuration
# ==============================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# ==============================
# MySQL Configuration
# ==============================

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://mysql:3306/bank
spring.datasource.username=root
spring.datasource.password=root


# ==============================
# JPA Configuration
# ==============================

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ==============================
# Flyway Configuration
# ==============================

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


# ==============================
# Server Configuration
# ==============================

server.port=8081


