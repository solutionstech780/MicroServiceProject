# Windows-friendly Docker Compose for Microservices
# Avoids conflicts with local MySQL, Redis, Kafka
services:

  # ==============================
  # Eureka Server
  # ==============================
  eureka:
    image: eureka-server
    container_name: eureka
    ports:
      - "8761:8761"

  # ==============================
  # MySQL
  # ==============================
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bank
    ports:
      - "3310:3306"      # Host 3310 → Container 3306
    volumes:
      - mysql_data:/var/lib/mysql

  # ==============================
  # Redis
  # ==============================
  redis:
    image: redis:7
    container_name: redis
    restart: always
    command: redis-server --requirepass Password123
    ports:
      - "6380:6379"      # Host 6380 → Container 6379
    volumes:
      - redis_data:/data

  # ==============================
  # Zookeeper
  # ==============================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ==============================
  # Kafka
  # ==============================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9093:9092"      # Host 9093 → Container 9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ==============================
  # Customer Service
  # ==============================
  customer-service:
    image: customer-service:latest
    container_name: customer-service
    restart: always
    depends_on:
      - mysql
      - redis
      - kafka
      - eureka
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: customer-service

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bank
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: Password123

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/

volumes:
  mysql_data:
  redis_data: