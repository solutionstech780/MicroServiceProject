version: "3.8"

services:

  # ==============================
  # Elasticsearch
  # ==============================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # ==============================
  # Logstash
  # ==============================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: logstash
    depends_on:
      - elasticsearch
    ports:
      - "5000:5000"   # TCP input from apps
      - "9600:9600"   # Logstash monitoring API
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline
      - ./elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m

  # ==============================
  # Kibana
  # ==============================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"

  # ==============================
  # Eureka Server
  # ==============================
  eureka:
      image: eureka-server
      container_name: eureka
      ports:
        - "8761:8761"

  # ==============================
  # MySQL
  # ==============================
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bank
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # ==============================
  # Redis
  # ==============================
  redis:
    image: redis:7
    container_name: redis
    restart: always
    command: redis-server --requirepass Password123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ==============================
  # Zookeeper
  # ==============================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ==============================
  # Kafka
  # ==============================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ==============================
  # Customer Service
  # ==============================
  customer-service:
    image: customer-service:latest
    container_name: customer-service
    restart: always
    depends_on:
      - mysql
      - redis
      - kafka
      - eureka
      - logstash
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: customer-service

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bank
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: Password123

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/

      MAIL_USERNAME: solutionstech780@gmail.com
      MAIL_PASSWORD: zvpapsnlqqczfvwo

      # Centralized logging (Logstash)
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000

  # ==============================
  # Prometheus
  # ==============================
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # ==============================
  # Grafana
  # ==============================
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: always
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  mysql_data:
  redis_data:
  es_data:
  grafana_data: